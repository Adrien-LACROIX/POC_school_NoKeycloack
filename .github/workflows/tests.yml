name: Test Unitaires

on:
  push:
    branches:
      - main

jobs:
  run-bash-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: verifier le path
        run: echo $PATH

      - name: 🔐 Donner les droits d'exécution au script
        run: chmod +x ./app/test.sh

      - name: ✅ Exécuter le script de tests
        run: ./app/test.sh
