name: SonarQube + Owaps ZAP
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  devsecops:
    runs-on: ubuntu-latest

    steps:
    # ✅ 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # ✅ 2. Setup Go
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23'

    # ✅ 3. Build the Go project
    - name: Build Go app
      working-directory: ./app
      run: go build -o app

    # ✅ 4. SonarQube Scan
    - name: Cache Sonar packages
      uses: actions/cache@v4
      with:
        path: ~/.sonar/cache
        key: ${{ runner.os }}-sonar

    - name: Run SonarQube Analysis
      uses: docker://sonarsource/sonar-scanner-cli:latest
      with:
        args: >
          -Dsonar.projectKey=ton_projet
          -Dsonar.sources=.
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}


    # ✅ 5. Start the Go web server
    - name: Start Go Web Server
      run: |
        nohup ./app &
        sleep 10

    # ✅ 6. OWASP ZAP scan with fail check
    - name: Run ZAP Scan + Fail on risk
      run: |
        docker run --network="host" \
          -v $(pwd):/zap/wrk/:rw \
          owasp/zap2docker-stable zap-baseline.py \
          -t http://localhost:8080 \
          -r zap-report.html \
          -x zap-report.xml \
          -J zap-report.json \
          -d

        echo "🔎 Analyzing ZAP output..."
        HIGH=$(jq '[.site[].alerts[] | select(.riskcode=="3")] | length' zap-report.json)
        MEDIUM=$(jq '[.site[].alerts[] | select(.riskcode=="2")] | length' zap-report.json)

        echo "➡️ High: $HIGH | Medium: $MEDIUM"
        if [ "$HIGH" -gt 0 ] || [ "$MEDIUM" -gt 0 ]; then
          echo "❌ Critical ZAP alerts detected"
          exit 1
        else
          echo "✅ No critical ZAP alerts"
        fi

    # ✅ 7. Upload the ZAP Report
    - name: Upload ZAP Report
      uses: actions/upload-artifact@v4
      with:
        name: ZAP Security Report
        path: zap-report.html
